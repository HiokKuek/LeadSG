name: ACRA Data Mirror ETL

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * 1"

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ETL dependencies
        run: pip install -r etl/requirements.txt

      - name: Run blue-green ETL
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          ACRA_API_KEY: ${{ secrets.ACRA_API_KEY }}
          ACRA_ENTITY_STATUS_FILTER: ${{ secrets.ACRA_ENTITY_STATUS_FILTER }}
          ACRA_POLL_RETRIES: ${{ secrets.ACRA_POLL_RETRIES }}
          ACRA_POLL_WAIT_SECS: ${{ secrets.ACRA_POLL_WAIT_SECS }}
          ACRA_RATE_LIMIT_DELAY: ${{ secrets.ACRA_RATE_LIMIT_DELAY }}
        run: python etl/acra_data_mirror.py
