name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  web:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Drizzle artifacts
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/leadsg
        run: npm run db:generate

      - name: Check Drizzle artifacts are committed
        run: git diff --exit-code -- drizzle
